cube:
  name: EventView
  sql_table: default.access

  dimensions:
    id:
      sql: id
      type: string
      primary_key: true
      title: ID

    ts:
      sql: ts
      type: time
      title: 时间

    risk:
      sql: arrayJoin(arrayFilter(x -> dictGetInt64('default.risk_dict','score',x)!=0,req_risk))
      type: string
      title: 风险规则

    ip:
      sql: ip
      type: string
      title: IP

    host:
      sql: host
      type: string
      title: 域名

    channel:
      sql: channel
      type: string
      title: 应用

    resultAction:
      sql: result_action
      type: string
      title: 防护动作

    resultType:
      sql: if(result='protect', '保护', '放行')
      type: string
      title: 处理结果

  segments:
    org:
      sql: org = ''
    owasp:
      sql: 1=1 # Placeholder

  measures:
    count:
      sql: count()
      type: number
      title: 事件量

    blockCount:
      sql: "countIf(result='protect')"
      type: number
      title: 阻断量

    uniqIpCount:
      sql: uniqHLL12(ip)
      type: number
      title: 唯一IP数
