cube:
  name: AccessRawView
  sql_table: default.access_raw_local

  segments:
    org:
      sql: "org = ''"

    black:
      sql: "1=1"

  dimensions:
    id:
      sql: id
      type: string
      primary_key: true
      title: ID

    ts:
      sql: ts
      type: time
      title: 时间

    url:
      sql: url
      type: string
      title: URL

    gorId:
      sql: "JSONExtractString(req, 'Headers', 'Gor-Msg-Id', 1)"
      type: string
      title: GorID

    # 请求原文：WS/TCP 协议做 base64 解码，截取前 100000 字节
    request:
      sql: "if(substr(JSONExtractString(req,'Method'),-3) IN ['C2S','S2C','TCP','WS'], jsonMergePatch(req, toJSONString(map('Body', tryBase64Decode(JSONExtractString(req, 'Body'))))), substr(req, 1, 100000))"
      type: string
      title: 请求原文

    # 响应原文：Body 超 100000 字节截断
    response:
      sql: "if(length(JSONExtractString(res, 'Body')) > 100000, jsonMergePatch(res, toJSONString(map('Body', subStr(JSONExtractString(res, 'Body'), 1, 100000) || '......'))), res)"
      type: string
      title: 响应原文

    # 文件内容预览（req.Files 或 res.File 存在时取 Body）
    fileContent:
      sql: "multiIf(visitParamExtractRaw(req, 'Files') != '', JSONExtractString(req, 'Body'), visitParamExtractRaw(res, 'File') != '', JSONExtractString(res, 'Body'), '')"
      type: string
      title: 文件内容预览
