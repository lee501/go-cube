cube:
  name: PromptView
  sql_table: default.prompt
  prewhere: true

  segments:
    org:
      sql: org = ''

  measures:
    count:
      sql: count()
      type: number
      title: 总数-分页

  dimensions:
    id:
      sql: id
      type: string
      primary_key: true
      title: ID

    ts:
      sql: ts
      type: time
      title: 时间

    prompt:
      sql: prompt
      type: string
      title: 提示词

    method:
      sql: method
      type: string
      title: 请求方法

    host:
      sql: host
      type: string
      title: 域名

    url:
      sql: url
      type: string
      title: URL

    uid:
      sql: uid
      type: string
      title: 用户ID

    ip:
      sql: ip
      type: string
      title: 客户端IP

    risk:
      sql: risk
      type: string
      title: 风险状态

    embedding:
      sql: embedding
      type: string
      title: 向量

    # TODO: 语义搜索相似度，依赖前端传入 search-embedding 向量，暂固定为 0
    score:
      sql: "toFloat64(0)"
      type: number
      title: 相似度
